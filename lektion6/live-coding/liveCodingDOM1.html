<!DOCTYPE html>
<html>
<head>
    <title>Live coding 1</title>
</head>
<body>
    <h1>My Page</h1>
    <p>Hello world!</p>
    <script>
        let titleNode = document.head;
        //console.log(titleNode);
        for(let child of titleNode.childNodes)
        {
            if(child.nodeType == Node.ELEMENT_NODE)
            {
                console.log(child.nodeName + " -> " + child.textContent);
            }
        }
        
        console.log(titleNode.nodeName + " -> " + titleNode.textContent);
        //const body = document.body;
        let childNodes = document.body.childNodes;
        for(let child of childNodes)
        {
            if(child.nodeType == Node.ELEMENT_NODE)
            {
                console.log(child.nodeName + " -> " + child.textContent);
            }            
            //console.log(child.nodeName);
            //console.log(child.textContent);
        }
    </script>
</body>
</html>
