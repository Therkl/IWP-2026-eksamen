<!DOCTYPE html>
<html>
<head>
  <title>Table exercise from Eloquent JavaScript textbook</title>
</head>
<body>

<h1>Mountains</h1>

<!-- This solution skips the DIV tag, and adds the table directly in the document -->

<script>
  const MOUNTAINS = [
    {name: "Kilimanjaro", height: 5895, place: "Tanzania"},
    {name: "Everest", height: 8848, place: "Nepal"},
    {name: "Mount Fuji", height: 3776, place: "Japan"},
    {name: "Vaalserberg", height: 323, place: "Netherlands"},
    {name: "Denali", height: 6168, place: "United States"},
    {name: "Popocatepetl", height: 5465, place: "Mexico"},
    {name: "Mont Blanc", height: 4808, place: "Italy/France"}
  ];

  // Create table
  const table = document.createElement('table');
  table.border = '1'; // To prevent invisible borders around the text.

  // Create header row
  const headerRow = document.createElement('tr');

  // Add key names to header row
  const headers = Object.keys(MOUNTAINS[0]);
  for(let header of headers)
  {
    const th = document.createElement('th');
    th.textContent = header;
    headerRow.appendChild(th);
  }

  table.appendChild(headerRow);

  // Create data rows
  for(let row of MOUNTAINS)
  {
    const rowElement = document.createElement('tr');

    // Iterate over individual elements of each row
    for(let rowValue of Object.values(row))
    {
        const td = document.createElement('td');
        td.textContent = rowValue;
        rowElement.appendChild(td);
    }

    table.appendChild(rowElement);
    
  }

  document.body.appendChild(table);

</script>

</body>
